name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test:
    name: build & test (${{ matrix.tfm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tfm: [net8.0, net9.0, net10.0]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (${{ matrix.tfm }})
        # Warnings are errors (see Directory.Build.props) so analyzer/API issues fail the build.
        run: dotnet build src/PolymorphicOwned.EntityFrameworkCore -c Release -f ${{ matrix.tfm }} --no-restore

      - name: Test (${{ matrix.tfm }})
        # Testcontainers spins Postgres via the Docker daemon preinstalled on the runner.
        run: dotnet test tests/PolymorphicOwned.EntityFrameworkCore.Tests -c Release -f ${{ matrix.tfm }} --no-restore

  migrations-scaffold:
    name: ef migrations add (no hand-editing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet tool restore
          dotnet restore samples/PolymorphicOwned.Sample

      - name: Scaffold a fresh migration and assert the polymorphic columns are emitted
        run: |
          set -euo pipefail
          # Scaffold from scratch (drop the committed migration in this ephemeral checkout) so the
          # generated migration is the full CreateTable, proving the columns are emitted unedited.
          rm -rf samples/PolymorphicOwned.Sample/Migrations
          dotnet tool run dotnet-ef migrations add CiScaffoldCheck \
            --project samples/PolymorphicOwned.Sample
          gen=$(ls samples/PolymorphicOwned.Sample/Migrations/*_CiScaffoldCheck.cs)
          echo "Generated: $gen"
          # Columns appear as anonymous-type member identifiers (col = table.Column<...>), not quoted.
          for col in discount_type percentage max_amount min_items \
                     amount min_order_total max_redemptions; do
            grep -qw "$col" "$gen" || { echo "MISSING column: $col"; exit 1; }
          done
          echo "All polymorphic columns present in the auto-generated migration."

  format:
    name: format & analyzers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Verify formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

  pack:
    name: pack
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SourceLink wants full history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Pack (SemVer + symbols)
        run: dotnet pack src/PolymorphicOwned.EntityFrameworkCore -c Release -o artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*

  publish:
    name: publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [build-test, migrations-scaffold, format, pack]
    # Only on merge to main and on version tags (v1.2.3) — never from a pull request.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SourceLink wants full history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve version
        id: version
        # Tag push -> the tag (v1.2.3 => 1.2.3). main push -> the Version in Directory.Build.props.
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack (SemVer + symbols)
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.value }}"
          if [[ -n "$version" ]]; then
            dotnet pack src/PolymorphicOwned.EntityFrameworkCore -c Release -o artifacts -p:Version="$version"
          else
            dotnet pack src/PolymorphicOwned.EntityFrameworkCore -c Release -o artifacts
          fi

      - name: Push to GitHub Packages
        # GitHub Packages doesn't accept .snupkg; the *.nupkg glob excludes it. SourceLink + embedded
        # sources keep the main package debuggable. --skip-duplicate makes re-runs idempotent.
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://nuget.pkg.github.com/RapidataAI/index.json
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
